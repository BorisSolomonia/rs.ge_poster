spring:
  config:
    import: "optional:file:.env[.properties]"
  application:
    name: camora-erp
  servlet:
    multipart:
      max-file-size: ${APP_MAX_FILE_SIZE:50MB}
      max-request-size: ${APP_MAX_REQUEST_SIZE:55MB}

server:
  port: "${APP_SERVER_PORT:8080}"

camora:
  api-prefix: "${CAMORA_API_PREFIX:/api/v1}"
  config-dir: "${CAMORA_CONFIG_DIR:${user.home}/.camora}"
  config-files:
    supplier-mappings: "${CAMORA_SUPPLIER_MAPPINGS_FILE:supplier-mappings.json}"
    product-mappings: "${CAMORA_PRODUCT_MAPPINGS_FILE:product-mappings.json}"
    standalone-suppliers: "${CAMORA_STANDALONE_SUPPLIERS_FILE:standalone-suppliers.json}"
  cors:
    allowed-origin-patterns: "${CAMORA_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}"
    allowed-methods: "${CAMORA_CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS}"
    allowed-headers: "${CAMORA_CORS_ALLOWED_HEADERS:*}"
    allow-credentials: "${CAMORA_CORS_ALLOW_CREDENTIALS:false}"
    max-age-seconds: "${CAMORA_CORS_MAX_AGE_SECONDS:3600}"
  result-cache:
    maximum-size: "${CAMORA_RESULT_CACHE_MAX_SIZE:20}"
    expire-after-hours: "${CAMORA_RESULT_CACHE_EXPIRE_AFTER_HOURS:12}"
  seed:
    enabled: "${CAMORA_SEED_ENABLED:true}"
    resource: "${CAMORA_SEED_RESOURCE:classpath:seed/supplier_mapping.csv}"
  reconciliation:
    result-expire-after-hours: "${CAMORA_RECONCILIATION_RESULT_EXPIRE_AFTER_HOURS:12}"
  rsge-api:
    endpoint: "${CAMORA_RSGE_ENDPOINT:https://services.rs.ge/WayBillService/WayBillService.asmx}"
    username: "${CAMORA_RSGE_USERNAME:}"
    password: "${CAMORA_RSGE_PASSWORD:}"
    timeout-seconds: "${CAMORA_RSGE_TIMEOUT_SECONDS:120}"
    debug: "${CAMORA_RSGE_DEBUG:false}"
    debug-sample-count: "${CAMORA_RSGE_DEBUG_SAMPLE_COUNT:3}"
    debug-response-snippet-length: "${CAMORA_RSGE_DEBUG_RESPONSE_SNIPPET_LENGTH:0}"
  platforms:
    rsge: "${CAMORA_PLATFORM_RSGE:RSGE}"
    poster: "${CAMORA_PLATFORM_POSTER:POSTER}"
  messages:
    validation-error: "${CAMORA_MESSAGE_VALIDATION_ERROR:Validation error}"
    internal-server-error-prefix: "${CAMORA_MESSAGE_INTERNAL_SERVER_ERROR_PREFIX:Internal server error: }"
    supplier-mapping-not-found-prefix: "${CAMORA_MESSAGE_SUPPLIER_MAPPING_NOT_FOUND_PREFIX:SupplierMapping not found: }"
    product-mapping-not-found-prefix: "${CAMORA_MESSAGE_PRODUCT_MAPPING_NOT_FOUND_PREFIX:ProductMapping not found: }"
    generic-not-found-prefix: "${CAMORA_MESSAGE_GENERIC_NOT_FOUND_PREFIX:Not found: }"
    missing-in-poster-template: '${CAMORA_MESSAGE_MISSING_IN_POSTER_TEMPLATE:Supplier "%s" appears in rs.ge (total=%s GEL) but has no Poster mapping. Either map it or mark excluded.}'
    missing-in-rsge-template: '${CAMORA_MESSAGE_MISSING_IN_RSGE_TEMPLATE:Poster supplier "%s" has deliveries (total=%s GEL) but no rs.ge waybills found. Either map or mark excluded.}'
    discrepancy-correction-template: '${CAMORA_MESSAGE_DISCREPANCY_CORRECTION_TEMPLATE:Supplier [%s / %s]: rs.ge=%s GEL, Poster=%s GEL. Gap: %s GEL. rs.ge products: [%s]. rs.ge waybills: [%s]. Poster docs: [%s]. Action: Review Poster delivery records for this supplier.}'
  parsers:
    rsge:
      skip-header-rows: "${CAMORA_RSGE_SKIP_HEADER_ROWS:1}"
      min-columns: "${CAMORA_RSGE_MIN_COLUMNS:18}"
      date-format: "${CAMORA_RSGE_DATE_FORMAT:dd-MM-yyyy HH:mm:ss}"
      columns:
        product-name: "${CAMORA_RSGE_COL_PRODUCT_NAME:1}"
        unit: "${CAMORA_RSGE_COL_UNIT:2}"
        quantity: "${CAMORA_RSGE_COL_QUANTITY:3}"
        unit-price: "${CAMORA_RSGE_COL_UNIT_PRICE:4}"
        total-price: "${CAMORA_RSGE_COL_TOTAL_PRICE:5}"
        waybill: "${CAMORA_RSGE_COL_WAYBILL:7}"
        supplier: "${CAMORA_RSGE_COL_SUPPLIER:10}"
        date: "${CAMORA_RSGE_COL_DATE:17}"
    poster:
      sheet-index: "${CAMORA_POSTER_SHEET_INDEX:0}"
      skip-header-rows: "${CAMORA_POSTER_SKIP_HEADER_ROWS:2}"
      date-format: "${CAMORA_POSTER_DATE_FORMAT:yyyy-MM-dd HH:mm:ss}"
      columns:
        document-number: "${CAMORA_POSTER_COL_DOCUMENT_NUMBER:1}"
        date: "${CAMORA_POSTER_COL_DATE:2}"
        supplier: "${CAMORA_POSTER_COL_SUPPLIER:3}"
        products-raw: "${CAMORA_POSTER_COL_PRODUCTS_RAW:6}"
        total-price: "${CAMORA_POSTER_COL_TOTAL_PRICE:9}"
  match-threshold: "${CAMORA_MATCH_THRESHOLD:0.01}"

logging:
  level:
    ge.camora.erp: "${CAMORA_LOG_LEVEL:DEBUG}"
