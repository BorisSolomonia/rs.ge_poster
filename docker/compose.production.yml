# Production Deployment - Camora ERP
# Deploy with: TAG=<commit-sha> docker compose -p camora-erp -f docker/compose.production.yml up -d

services:
  backend:
    image: us-central1-docker.pkg.dev/${GCP_PROJECT_ID}/orderapp/camora-erp-backend:${TAG}
    container_name: camora-erp-backend
    restart: unless-stopped
    env_file:
      - .env
    expose:
      - "8080"
    volumes:
      - camora_data:/data/camora
    networks:
      - web
    deploy:
      resources:
        limits:
          memory: 768M
          cpus: "0.5"
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    image: us-central1-docker.pkg.dev/${GCP_PROJECT_ID}/orderapp/camora-erp-frontend:${TAG}
    container_name: camora-erp-frontend
    restart: unless-stopped
    expose:
      - "3000"
    networks:
      - web
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.25"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  web:
    external: true

volumes:
  camora_data:
